<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Prayer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-bottom: 5px solid #000;
            margin-bottom: 20px;
            padding-bottom: 20px;
        }
        .header-title {
            text-align: center;
            font-weight: bold;
            font-size: 24px;
            margin: 20px 0;
        }
        .lyrics {
            padding: 0 20px;
            line-height: 1.6;
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        .player-card {
            background-color: #fff5f5;
            margin: 15px 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: monospace;
            font-size: 14px;
        }
        input[type="range"] {
            flex-grow: 1;
            margin: 0 10px;
            cursor: pointer;
        }
        .button-group {
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            gap: 5px;
        }
        .btn {
            background: #808080; 
            color: white;
            border: 2px solid #555;
            border-radius: 25px;
            padding: 8px 0;
            width: 24%;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .btn.downloaded {
            background: #28a745 !important;
            border-color: #1e7e34;
        }
        .btn:active {
            transform: translateY(2px);
        }
        .lyrics-part { display: none; }
        .lyrics-part.active { display: block; }
    </style>
</head>
<body>

    <div class="header-title" id="main-title"> বাংলা এবং ইংরেজি মাসের নাম</div>
    <div id="stanza-container"></div>

    <script>
        // ১টি স্ট্যাঞ্জার জন্য মিউজিক সোর্স
        const musicData = {
            1: { 
                clip: 'https://www.dropbox.com/scl/fi/5jbtmo4sb6p0r8umon4dg/MonthsBengali-Gap.mp3?rlkey=1tfw3djxqb6qfjci0wl28ukji&st=d384zsv3&raw=1', 
                segment: 'https://www.dropbox.com/scl/fi/6yadpr3t0b136fr97ttvt/MonthsEnglish-Gap.mp3?rlkey=1hlhr4ciobgq0vr0wrn2gw56z&st=p7ekdi0t&raw=1', 
                bengali: 'https://www.dropbox.com/scl/fi/5vsb1db3jg34ah8b1f9wj/MonthsBengali.mp3?rlkey=s65t1lx3psig7udklxt5dooiw&st=hi0d4bc6&raw=1', 
                english: 'https://www.dropbox.com/scl/fi/mr2n5cwnn9idhiiw8f0y4/MonthsEnglish.mp3?rlkey=yoiqzoapprw4pp5xh30g89i82&st=0v6nw8ny&raw=1' 
            }
        };

        const stanzas = [
            { text: " <hr> বৈশাখ, জ্যৈষ্ঠ, আষাঢ়, শ্রাবণ, ভাদ্র, আশ্বিন, কার্তিক, অগ্রহায়ণ, পৌষ, মাঘ, ফাল্গুন, চৈত্র।<br><br> January, February, March, April, May, June, July, August, September, October, November, December. <hr> বৈশাখ, জ্যৈষ্ঠ, আষাঢ়, শ্রাবণ, ভাদ্র, আশ্বিন, কার্তিক, অগ্রহায়ণ, পৌষ, মাঘ, ফাল্গুন, চৈত্র।<br><br> January, February, March, April, May, June, July, August, September, October, November, December. <hr> বৈশাখ, জ্যৈষ্ঠ, আষাঢ়, শ্রাবণ, ভাদ্র, আশ্বিন, কার্তিক, অগ্রহায়ণ, পৌষ, মাঘ, ফাল্গুন, চৈত্র।<br><br> January, February, March, April, May, June, July, August, September, October, November, December. <hr> ", id: 1 }
        ];

        const container = document.getElementById('stanza-container');
        let activeAudio = null;

        function processLyrics(htmlText, id) {
            const parts = htmlText.split('<hr>');
            const actualParts = parts.filter(p => p.trim() !== "");
            return `
                <div id="part-segment-${id}" class="lyrics-part">${actualParts[0]}</div>
                <div id="part-clip-${id}" class="lyrics-part active">${actualParts[1]}</div>
                <div id="part-full-${id}" class="lyrics-part">${actualParts[2]}</div>
            `;
        }

        // শুধুমাত্র ১টি স্ট্যাঞ্জা রেন্ডার করা হচ্ছে
        const i = 1;
        const section = document.createElement('div');
        section.className = 'container';
        section.id = `container-${i}`;
        section.innerHTML = `
            <div class="lyrics">${processLyrics(stanzas[i-1].text, i)}</div>
            <div class="player-card">
                <div class="progress-container">
                    <span id="current-time-${i}">0:00</span>
                    <input type="range" id="progress-${i}" value="0" min="0" max="100" oninput="seekAudio(${i})">
                    <span id="duration-${i}">0:00</span>
                </div>
            </div>
            <div class="button-group" id="btn-group-${i}">
                <button class="btn" id="btn-bengali-${i}">Loading...</button>
                <button class="btn" id="btn-english-${i}">Loading...</button>
                <button class="btn" id="btn-clip-${i}">Loading...</button>
                <button class="btn" id="btn-segment-${i}">Loading...</button>
            </div>
            <audio id="audio-${i}" preload="auto"></audio>
        `;
        container.appendChild(section);
        setupAudioEvents(i);
        preloadStanza(i);

        function setupAudioEvents(id) {
            const audio = document.getElementById(`audio-${id}`);
            const progress = document.getElementById(`progress-${id}`);
            const curTimeTxt = document.getElementById(`current-time-${id}`);
            const durTimeTxt = document.getElementById(`duration-${id}`);

            audio.ontimeupdate = () => {
                const val = (audio.currentTime / audio.duration) * 100;
                progress.value = val || 0;
                curTimeTxt.innerText = formatTime(audio.currentTime);
                durTimeTxt.innerText = formatTime(audio.duration);
            };

            audio.onended = () => {
                const btnBen = document.getElementById(`btn-bengali-${id}`);
                btnBen.innerText = "Bengali";
            };
        }

        function preloadStanza(id) {
            const btnBen = document.getElementById(`btn-bengali-${id}`);
            const btnEng = document.getElementById(`btn-english-${id}`);
            const btnClip = document.getElementById(`btn-clip-${id}`);
            const btnSeg = document.getElementById(`btn-segment-${id}`);
            
            let clipRdy = false, segRdy = false, benRdy = false, engRdy = false;

            const checkReady = () => {
                if (clipRdy && segRdy && benRdy && engRdy) {
                    btnBen.innerText = "Bengali";
                    btnBen.onclick = () => playSong(id, 'bengali');
                    btnEng.innerText = "English";
                    btnEng.onclick = () => playSong(id, 'english');
                    btnClip.innerText = "Clip1";
                    btnClip.onclick = () => playSong(id, 'clip');
                    btnSeg.innerText = "Clip2";
                    btnSeg.onclick = () => playSong(id, 'segment');

                    [btnBen, btnEng, btnClip, btnSeg].forEach(b => b.classList.add('downloaded'));
                }
            };

            new Audio(musicData[id].clip).oncanplaythrough = () => { clipRdy = true; checkReady(); };
            new Audio(musicData[id].segment).oncanplaythrough = () => { segRdy = true; checkReady(); };
            new Audio(musicData[id].bengali).oncanplaythrough = () => { benRdy = true; checkReady(); };
            new Audio(musicData[id].english).oncanplaythrough = () => { engRdy = true; checkReady(); };
        }

        function playSong(id, type) {
            const audio = document.getElementById(`audio-${id}`);
            const btnBen = document.getElementById(`btn-bengali-${id}`);

            // শো-হাইড ফিচার বন্ধ রাখা হয়েছে নির্দেশ অনুযায়ী
            document.getElementById(`container-${id}`).style.display = 'block';

            document.querySelectorAll(`#container-${id} .lyrics-part`).forEach(p => p.classList.remove('active'));
            if (type === 'bengali' || type === 'english') {
                document.getElementById(`part-full-${id}`).classList.add('active');
            } else {
                document.getElementById(`part-${type}-${id}`).classList.add('active');
            }

            if (activeAudio === audio && audio.dataset.currentType === type) {
                if (!audio.paused) {
                    audio.pause();
                    btnBen.innerText = "Play";
                } else {
                    audio.play();
                    btnBen.innerText = "Pause";
                }
                return;
            }

            if (activeAudio && activeAudio !== audio) {
                stopAndResetButtons(activeAudio.id.split('-')[1]);
            }

            audio.src = musicData[id][type];
            audio.dataset.currentType = type;
            activeAudio = audio;
            audio.play();

            updateControls(id);
        }

        function updateControls(id) {
            const audio = document.getElementById(`audio-${id}`);
            const btnBen = document.getElementById(`btn-bengali-${id}`);
            const btnEng = document.getElementById(`btn-english-${id}`);
            const btnClip = document.getElementById(`btn-clip-${id}`);
            const btnSeg = document.getElementById(`btn-segment-${id}`);

            btnBen.innerText = "Pause";
            btnBen.onclick = () => {
                if (audio.paused) { audio.play(); btnBen.innerText = "Pause"; }
                else { audio.pause(); btnBen.innerText = "Play"; }
            };

            btnEng.innerText = "Stop"; 
            btnEng.onclick = () => { audio.pause(); audio.currentTime = 0; btnBen.innerText = "Play"; };

            btnClip.innerText = "Replay";
            btnClip.onclick = () => { audio.currentTime = 0; audio.play(); btnBen.innerText = "Pause"; };

            btnSeg.innerText = "Reset";
            btnSeg.onclick = () => resetUI(id);
        }

        function stopAndResetButtons(id) {
            const audio = document.getElementById(`audio-${id}`);
            audio.pause();
            audio.currentTime = 0;
            
            const btnBen = document.getElementById(`btn-bengali-${id}`);
            const btnEng = document.getElementById(`btn-english-${id}`);
            const btnClip = document.getElementById(`btn-clip-${id}`);
            const btnSeg = document.getElementById(`btn-segment-${id}`);
            
            btnBen.innerText = "Bengali";
            btnBen.onclick = () => playSong(id, 'bengali');
            btnEng.innerText = "English";
            btnEng.onclick = () => playSong(id, 'english');
            btnClip.innerText = "Clip1";
            btnClip.onclick = () => playSong(id, 'clip');
            btnSeg.innerText = "Clip2";
            btnSeg.onclick = () => playSong(id, 'segment');
        }

        function resetUI(id) {
            const audio = document.getElementById(`audio-${id}`);
            audio.pause();
            audio.currentTime = 0;
            audio.dataset.currentType = "";
            activeAudio = null;

            document.querySelectorAll('.lyrics-part').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('[id^="part-clip-"]').forEach(p => p.classList.add('active'));

            stopAndResetButtons(id);

            document.getElementById(`current-time-${id}`).innerText = "0:00";
            document.getElementById(`progress-${id}`).value = 0;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }

        function seekAudio(id) {
            const audio = document.getElementById(`audio-${id}`);
            const progress = document.getElementById(`progress-${id}`);
            if (audio.duration) {
                audio.currentTime = (progress.value / 100) * audio.duration;
            }
        }
    </script>
</body>
</html>
